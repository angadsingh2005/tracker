<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering Roadmap Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-main: #0b0d10;
  --bg-card: #15181e;
  --bg-hover: #1e222b;
  --text-main: #e2e8f0;
  --text-muted: #94a3b8;
  --border-color: #2a303c;
  --accent-primary: #10b981;
  --accent-glow: rgba(16, 185, 129, 0.2);
  --accent-secondary: #059669;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg-main); color: var(--text-main); min-height: 100vh; line-height: 1.5; }
.app { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; position: relative; }

/* Auth Bar */
.auth-bar {
  background: rgba(21, 24, 30, 0.8);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 1.5rem;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
}
.auth-input {
  background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main);
  padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: var(--font-sans);
  outline: none; transition: border-color 0.2s;
}
.auth-input:focus { border-color: var(--accent-primary); }

.hero {
  background: linear-gradient(135deg, #131b23 0%, #0d141b 100%);
  border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
}
.hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-primary), transparent); }
.hero h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; color: #fff; letter-spacing: -0.5px; }
.hero p { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; font-family: var(--font-mono); }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem; text-align: center; transition: transform 0.2s, background 0.2s; }
.stat-card:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-2px); }
.stat-card .val { font-size: 24px; font-weight: 600; color: var(--accent-primary); font-family: var(--font-mono); }
.stat-card .lbl { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

.progress-bar-wrap { margin-top: 1.5rem; }
.prog-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: 500; }
.prog-track { background: var(--bg-hover); border-radius: 99px; height: 8px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
.prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary)); box-shadow: 0 0 10px var(--accent-glow); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

/* Buttons & Timer */
.btn {
  background: var(--bg-hover); border: 1px solid var(--border-color); color: var(--text-main);
  padding: 8px 16px; border-radius: 8px; font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.btn:hover { background: rgba(255, 255, 255, 0.1); }
.btn.active { background: var(--accent-primary); color: #0b0d10; border-color: var(--accent-primary); font-weight: 600; }
.btn.active:hover { background: var(--accent-secondary); }
.btn-outline { background: transparent; }

.timer-card { background: var(--bg-card); border: 1px solid var(--accent-primary); border-radius: 16px; padding: 1.5rem; text-align: center; margin-bottom: 2rem; box-shadow: 0 0 20px var(--accent-glow); display: flex; flex-direction: column; align-items: center; gap: 12px; }
.timer-display { font-size: 48px; font-weight: 600; font-family: var(--font-mono); color: var(--accent-primary); letter-spacing: 2px; line-height: 1; }
.timer-lbl { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

/* Views */
.chart-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.month-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.mtab { padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
.mtab:hover { background: var(--bg-hover); color: var(--text-main); }
.mtab.active { background: var(--accent-glow); color: var(--accent-primary); border-color: var(--accent-primary); }
.mtab.done { border-color: var(--accent-secondary); color: var(--accent-secondary); }

.month-view { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 3rem;}
.month-header { padding: 1.25rem 1.5rem; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
.month-header h2 { font-size: 16px; font-weight: 600; color: #fff; }
.month-header .mprog { font-size: 14px; color: var(--accent-primary); font-family: var(--font-mono); }
.month-prog-bar { height: 3px; background: var(--bg-hover); }
.month-prog-inner { height: 100%; background: var(--accent-primary); transition: width 0.4s; }

.week-block { border-bottom: 1px solid var(--border-color); }
.week-block:last-child { border-bottom: none; }
.week-hdr { padding: 1rem 1.5rem; background: transparent; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; transition: background 0.2s; }
.week-hdr:hover { background: var(--bg-hover); }
.week-hdr h3 { font-size: 15px; font-weight: 500; flex: 1; color: var(--text-main); }
.week-hdr .wk-prog { font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }
.week-hdr .toggle { font-size: 18px; color: var(--text-muted); transition: transform 0.3s; }
.week-hdr .toggle.open { transform: rotate(180deg); }

.days-list { display: none; background: rgba(0,0,0,0.15); }
.days-list.open { display: block; }
.day-row { display: grid; grid-template-columns: 100px 1fr 44px; align-items: start; padding: 1rem 1.5rem; border-top: 1px solid var(--border-color); gap: 16px; transition: background 0.2s; }
.day-row:hover { background: var(--bg-hover); }
.day-row.rest-row { opacity: 0.5; }
.day-name { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
.task-txt { font-size: 14px; color: var(--text-muted); }
.task-txt strong { color: var(--text-main); font-weight: 600; }

.check-btn { width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--border-color); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; color: transparent; }
.check-btn:hover:not(.rest) { border-color: var(--accent-primary); background: var(--accent-glow); }
.check-btn.done { background: var(--accent-primary); border-color: var(--accent-primary); color: #0b0d10; box-shadow: 0 0 10px var(--accent-glow); }
.check-btn.rest { background: transparent; border-color: transparent; cursor: default; font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

.day-mon { color: #60a5fa; } .day-tue { color: #34d399; } .day-wed { color: var(--accent-primary); } .day-thu { color: #fbbf24; } .day-fri { color: #f43f5e; } .day-sat { color: #a78bfa; } .day-sun { color: #94a3b8; }
</style>
</head>

<div class="timer-card">

    <button class="btn" onclick="resetSessionTimer()">Reset Session</button>
  </div>
</div>

<div class="chart-container">
  <canvas id="progressChart" height="60"></canvas>
</div>

<div class="month-tabs" id="month-tabs"></div>
<div class="month-view" id="month-view"></div>
</div>

  const DAY_CLASS = {Monday:"day-mon",Tuesday:"day-tue",Wednesday:"day-wed",Thursday:"day-thu",Friday:"day-fri",Saturday:"day-sat",Sunday:"day-sun"};

  // 5. GLOBAL STATE & TRACKING VARIABLES
  let state = {};
  let currentMonth = 0;
  let openWeeks = {};
  let progressChart = null;
  let timerInterval = null;
  let currentSessionSeconds = 0;
  let globalTotalSeconds = 0;
  let currentUserUID = null;

  // 6. FIREBASE CLOUD SYNC LOGIC
  async function saveToCloud() {
    if (!currentUserUID) return;
    state.globalTotalSeconds = globalTotalSeconds;
    try {
      await setDoc(doc(db, "users", currentUserUID), { state: state });
    } catch (e) {
      console.error("Error saving document: ", e);
    }
  }

  async function loadFromCloud(uid) {
    const docRef = doc(db, "users", uid);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      state = docSnap.data().state || {};
      globalTotalSeconds = state.globalTotalSeconds || 0;
    } else {
      state = {};
      globalTotalSeconds = 0;
    }
    updateStats();
    renderTabs();
    renderMonth();
  }

  // 7. AUTHENTICATION UI LOGIC
  const unloggedDiv = document.getElementById('auth-unlogged');
  const loggedDiv = document.getElementById('auth-logged');
  const emailInput = document.getElementById('auth-email');
  const passInput = document.getElementById('auth-password');
  const displayEmail = document.getElementById('user-display-email');

  document.getElementById('btn-login').addEventListener('click', () => {
    const email = emailInput.value; const pass = passInput.value;
    if(!email || !pass) return alert("Please enter email and password.");
    signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
  });

  document.getElementById('btn-register').addEventListener('click', () => {
    const email = emailInput.value; const pass = passInput.value;
    if(!email || !pass) return alert("Please enter email and password to register.");
    createUserWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    signOut(auth);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserUID = user.uid;
      unloggedDiv.style.display = 'none';
      loggedDiv.style.display = 'flex';
      displayEmail.textContent = user.email;
      emailInput.value = ''; passInput.value = '';
      loadFromCloud(user.uid);
    } else {
      currentUserUID = null;
      unloggedDiv.style.display = 'flex';
      loggedDiv.style.display = 'none';
      state = {}; globalTotalSeconds = 0;
      if (timerInterval) window.resetSessionTimer();
      updateStats(); renderTabs(); renderMonth();
    }
  });

  // 8. DATA COMPUTATION LOGIC
  function key(mi, wi, di) { return `${mi}_${wi}_${di}`; }
  
  function getTotalStudyDays() { return CURRICULUM.reduce((a,m) => a + m.weeks.reduce((b,w) => b + w.days.filter(d=>d.isStudy).length, 0), 0); }
  
  function computeStats() {
    let done = 0;
    CURRICULUM.forEach((m,mi) => m.weeks.forEach((w,wi) => w.days.forEach((d,di) => { if(state[key(mi,wi,di)] && d.isStudy) done++; })));
    let hrs = globalTotalSeconds / 3600;
    return { done, hrs, total: getTotalStudyDays() };
  }

  function computeStreak() {
    const allDays = [];
    CURRICULUM.forEach((m,mi) => m.weeks.forEach((w,wi) => w.days.forEach((d,di) => { if(d.isStudy) allDays.push(key(mi,wi,di)); })));
    let streak = 0;
    for(let i = allDays.length-1; i >= 0; i--) { if(state[allDays[i]]) streak++; else break; }
    return streak;
  }

  function monthProgress(mi) {
    const m = CURRICULUM[mi]; let done = 0, total = 0;
    m.weeks.forEach((w,wi) => w.days.forEach((d,di) => { if(d.isStudy) { total++; if(state[key(mi,wi,di)]) done++; } }));
    return { done, total };
  }

  // 9. TIMER LOGIC (Bound to Window for HTML calls)
  function formatTime(totalSeconds) {
    const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
    const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
    const s = (totalSeconds % 60).toString().padStart(2, '0');
    return `${h}:${m}:${s}`;
  }

  function updateTimerUI() { document.getElementById('timer-display').textContent = formatTime(currentSessionSeconds); }

  window.toggleTimer = function() {
    if (!currentUserUID) return alert("Please sign in to track study time.");
    const btn = document.getElementById('btn-toggle-timer');
    if (timerInterval) {
      clearInterval(timerInterval); timerInterval = null;
      btn.innerHTML = '▶ Resume Studying'; btn.classList.remove('active');
      btn.style.background = 'var(--bg-hover)'; btn.style.color = 'var(--text-main)';
      saveToCloud();
    } else {
      btn.innerHTML = '⏸ Pause Timer'; btn.classList.add('active');
      btn.style.background = 'var(--accent-primary)'; btn.style.color = '#0b0d10';
      timerInterval = setInterval(() => {
        currentSessionSeconds++; globalTotalSeconds++;
        updateTimerUI(); updateStats();
      }, 1000);
    }
  };

  window.resetSessionTimer = function() {
    if (timerInterval) window.toggleTimer();
    currentSessionSeconds = 0; updateTimerUI();
  };

  // 10. UI RENDERING LOGIC
  function renderChart() {
    const ctx = document.getElementById('progressChart').getContext('2d');
    const labels = CURRICULUM.map((_, i) => `Month ${i + 1}`);
    const data = CURRICULUM.map((_, i) => monthProgress(i).done);

    Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = "'Inter', sans-serif";
    if (progressChart) { progressChart.data.datasets[0].data = data; progressChart.update(); } 
    else {
      progressChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ label: 'Days Completed', data: data, backgroundColor: '#10b981', borderRadius: 4 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 28, grid: { color: '#2a303c' } }, x: { grid: { display: false } } } }
      });
    }
  }

  function updateStats() {
    const s = computeStats();
    document.getElementById('s-done').textContent = s.done;
    document.getElementById('s-total').textContent = s.total;
    document.getElementById('s-streak').textContent = computeStreak();
    document.getElementById('s-hrs').textContent = s.hrs.toFixed(1);
    const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
    document.getElementById('s-pct').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';
    renderChart();
  }

  window.renderTabs = function() {
    const container = document.getElementById('month-tabs'); container.innerHTML = '';
    CURRICULUM.forEach((m, mi) => {
      const {done, total} = monthProgress(mi);
      const btn = document.createElement('button');
      btn.className = 'mtab' + (mi === currentMonth ? ' active' : '') + (done === total && total > 0 ? ' done' : '');
      btn.textContent = 'M' + (mi+1) + (done === total && total > 0 ? ' ✓' : '');
      btn.onclick = () => { currentMonth = mi; renderTabs(); renderMonth(); };
      container.appendChild(btn);
    });
  };

  window.renderMonth = function() {
    const mi = currentMonth; const m = CURRICULUM[mi];
    const {done, total} = monthProgress(mi);
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const container = document.getElementById('month-view');

    let html = `<div class="month-header"><h2>${m.title}</h2><span class="mprog">${done}/${total} days &bull; ${pct}%</span></div><div class="month-prog-bar"><div class="month-prog-inner" style="width:${pct}%"></div></div>`;

    m.weeks.forEach((w, wi) => {
      const wkey = `${mi}_${wi}`; const isOpen = openWeeks[wkey] !== false;
      let wkDone = 0, wkTotal = 0;
      w.days.forEach((d,di) => { if(d.isStudy){wkTotal++;if(state[key(mi,wi,di)])wkDone++;} });
      html += `<div class="week-block"><div class="week-hdr" onclick="toggleWeek('${wkey}')"><h3>${w.title}</h3><span class="wk-prog">${wkDone}/${wkTotal}</span><span class="toggle ${isOpen?'open':''}">&#8964;</span></div><div class="days-list ${isOpen?'open':''}"><div style="padding:.5rem 1.25rem .25rem;font-size:12px;color:var(--text-muted);font-style:italic">${w.focus}</div>`;
      
      w.days.forEach((d, di) => {
        const k = key(mi, wi, di); const isDone = !!state[k]; const isRest = !d.isStudy;
        html += `<div class="day-row ${isRest?'rest-row':''}"><div class="day-name ${DAY_CLASS[d.d]}">${d.d}</div><div class="task-txt">${d.t}</div>${isRest ? `<div class="check-btn rest">off</div>` : `<button class="check-btn ${isDone?'done':''}" onclick="toggle('${k}','${mi}','${wi}','${di}')">${isDone?'✓':''}</button>`}</div>`;
      });
      html += `</div></div>`;
    });
    container.innerHTML = html;
  };

  window.toggleWeek = function(wkey) { openWeeks[wkey] = !(openWeeks[wkey] !== false); renderMonth(); };
  
  window.toggle = function(k, mi, wi, di) {
    if (!currentUserUID) return alert("Please sign in to save your progress.");
    state[k] = !state[k]; saveToCloud(); updateStats(); renderTabs(); renderMonth();
  };

  // INITIAL RENDER
  renderTabs(); renderMonth(); updateStats(); updateTimerUI();
</script>
